services:
  openvpn-client:
    image: ghcr.io/atallo/docker-openvpn-client:latest
    container_name: openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Europe/Madrid
      - ALLOWED_SUBNETS=192.168.10.0/24
      # OpenVPN config file to use (within /config).
      - CONFIG_FILE=client.ovpn
      # VPN credentials (alternative to a Docker secret via AUTH_SECRET).
      # If your provider uses TOTP/2FA, also set TOTP_KEY and it is appended to
      # the password automatically.
      - VPN_USERNAME=myuser
      - VPN_PASSWORD=mypassword
      # - TOTP_KEY=ABCD1234...
      # Port forwarding into the VPN. Set up automatically (nftables) when present;
      # no need to edit the .ovpn file. Format:
      #   <proto>:<listen_port>:<dest_ip>[:<dest_port>], space/comma separated.
      # proto = tcp | udp | both. See README for details.
      - PORT_FORWARDS=both:3389:10.160.150.220
    # Required for the port forwarding to route. Many runtimes mount /proc/sys
    # read-only, so this must be set here rather than from inside the container.
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./local:/config
    restart: unless-stopped
