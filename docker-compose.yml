services:
  openvpn-client:
    image: ghcr.io/atallo/docker-openvpn-client:latest
    container_name: openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Europe/Madrid
      - ALLOWED_SUBNETS=192.168.10.0/24
      # OpenVPN config file to use (within /config).
      - CONFIG_FILE=client.ovpn
      # Port forwarding into the VPN, handled by portforward.sh (nftables).
      # Format: <proto>:<listen_port>:<dest_ip>[:<dest_port>], space/comma separated.
      # proto = tcp | udp | both. See README for details.
      - PORT_FORWARDS=both:3389:10.160.150.220
    # Required for the DNAT/masquerade port forwarding to actually route.
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./local:/config
    restart: unless-stopped
