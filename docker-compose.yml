services:
  openvpn-client:
    image: ghcr.io/atallo/docker-openvpn-client:latest
    container_name: openvpn-client
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Europe/Madrid
      - ALLOWED_SUBNETS=192.168.10.0/24
      # OpenVPN config file to use (within /config). REQUIRED.
      - CONFIG_FILE=client.ovpn
      # Override the address in the config's "remote" line(s). Optional.
      # - REMOTE_IP=203.0.113.10
      # VPN credentials (alternative to a Docker secret via AUTH_SECRET).
      # If your provider uses TOTP/2FA, also set AUTH_TOTP_KEY (base32) and it is
      # appended to the password automatically.
      - AUTH_USERNAME=myuser
      - AUTH_PASSWORD=mypassword
      # - AUTH_TOTP_KEY=ABCD1234...
      # Kill switch. Defaults to off. It uses nftables and needs a host that
      # exposes netfilter to the container; leave it off on environments that
      # don't (e.g. unprivileged LXC). Port forwarding works regardless (socat).
      # - KILL_SWITCH=on
      # Port forwarding into the VPN with userspace socat (no netfilter, works
      # anywhere). No need to edit the .ovpn file. Format:
      #   <proto>:<listen_port>:<dest>[:<dest_port>], space/comma separated.
      # proto = tcp | udp | both. <dest> may be an IP or a hostname.
      - PORT_FORWARDS=both:3389:192.168.0.10
      # DNS server used to resolve hostnames in PORT_FORWARDS (e.g. the VPN's own
      # DNS, for names only it knows). Optional.
      # - PORT_FORWARDS_DNS=10.174.123.50
      # Command run (via sh -c) once the tunnel is up. Optional.
      # - POST_UP_COMMAND=curl -fsS https://example.com/notify
    ports:
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./local:/config
    restart: unless-stopped
