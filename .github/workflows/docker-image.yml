name: Build and publish image

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # Usa el nombre del repositorio: ghcr.io/atallo/docker-openvpn-client
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # No hace falta en pull_request (no se publica nada).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels, annotations)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # GHCR reads the description of a multi-arch image from the OCI
          # annotations on the manifest list (index), not from labels. The env
          # below pushes the annotations all the way up to that index level.
          annotations: |
            org.opencontainers.image.description=OpenVPN client container with userspace port forwarding (socat) and an optional nftables kill switch.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./build
          file: ./build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Disable provenance/SBOM attestations: they show up in the manifest
          # list as "unknown/unknown" entries on GHCR and stop its UI from
          # reading the description. Re-enable if you need SLSA provenance.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
